<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jq site</title>
    <link rel="stylesheet" href="main.css">
     <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="main.js"></script>
</head>
<body>
    <header class="header">
        <h1 class="logo">shop</h1>
        <ul class="menu">
            <li>new</li>
            <li>best</li>
            <li>sale</li>
            <li>event</li>
        </ul>
        <div class="mobile-btn">☰</div>
    </header>
    <!-- 모바일 일 때 메뉴 -->
     <div class="mobile-menu">
        <ul>
            <li>new</li>
            <li>best</li>
            <li>sale</li>
            <li>event</li>
        </ul>
     </div>
     <!-- 비주얼 -->
      <section class="visual">
        <h1>summer collection</h1>
        <p>green shoppingmall</p>
      </section>
      <!-- 상품 -->
       <section class="search-wrap">
        <input type="text" class="search-input" placeholder="상품 검색">
        <div class="tab-menu">
            <div class="tab-btn active" data-category="all">전체</div>
            <div class="tab-btn" data-category="shoes">신발</div>
            <div class="tab-btn" data-category="bag">가방</div>
            <div class="tab-btn" data-category="cap">모자</div>
        </div>
       </section>
       <!-- 상품 카드 -->
       <section class="product-wrap">
        <!-- js 출력 -->
         <div class="product">
            <!-- 상품 이미지 -->
             <img src="" alt="">
             <div class="product-content">
                <!-- 상품 이름 -->
                 <h3>상품이름</h3>
                 <!-- 상품가격 -->
                  <p class="price">129000 원</p>
                  <!-- 버튼들 -->
                   <div class="btn-wrap">
                    <!-- 장바구니 버튼 -->
                     <button class="cart-btn">장바구니</button>
                     <button class="like-btn">❤</button>
                   </div>
             </div>
         </div>
       </section>
</body>
</html>
